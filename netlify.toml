[build]
  command = "npm install --legacy-peer-deps && npx taro build --type h5 && cp -r src/assets/tiles dist/tiles && cp public/404.html dist/404.html"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
