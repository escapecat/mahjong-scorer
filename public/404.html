<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=/mahjong-scorer/" />
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to <a href="/mahjong-scorer/">/mahjong-scorer/</a></p>
  <script>
    // Preserve hash/path on refresh
    var path = window.location.pathname.replace(/^\/mahjong-scorer/, '');
    window.location.replace('/mahjong-scorer/' + (path ? '#' + path : ''));
  </script>
</body>
</html>
