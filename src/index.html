<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>国标麻将算番器</title>
  <meta name="description" content="国标麻将算番器，自动计算全部81个番种。支持听牌提示、番种分解、自摸点炮、门风圈风、花牌、杠上开花等。免费在线工具，手机可用。" />
  <style>
    html, body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #f7f9fc 0%, #eef1f6 45%, #e6ebf2 100%);
      color: #1f2937;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    * { box-sizing: border-box; }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }
    .loading-icon {
      font-size: 64px;
      animation: loading-bounce 1.2s ease-in-out infinite;
    }
    @keyframes loading-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .loading-title {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 1px;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      margin: 8px 0;
    }
    .loading-progress {
      width: 100%;
      height: 100%;
      animation: loading-rotate 1.2s linear infinite;
    }
    .loading-progress circle {
      fill: none;
      stroke-width: 3px;
    }
    .loading-progress circle:first-child {
      stroke: #e2e8f0;
    }
    .loading-progress circle:last-child {
      stroke: #2563eb;
      stroke-dasharray: 220;
      stroke-dashoffset: 60;
      stroke-linecap: round;
    }
    @keyframes loading-rotate {
      to { transform: rotate(360deg); }
    }
    .loading-hint {
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
  <script>
    if (!window.location.hash) {
      window.location.replace(window.location.pathname + '#/pages/index/index');
    }
  </script>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-icon">🀄</div>
      <div class="loading-title">国标麻将算番器</div>
      <div class="loading-spinner">
        <svg class="loading-progress">
          <circle r="40%" cx="50%" cy="50%" />
          <circle r="40%" cx="50%" cy="50%" />
        </svg>
      </div>
      <div class="loading-hint">正在加载，请稍候…</div>
    </div>
  </div>
</body>
</html>
